<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Chart</title>

<!-- Load Chart.js OFFLINE -->
<script src="chart.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        text-align: center;
        padding: 20px;
    }

    h2 {
        margin-bottom: 20px;
    }

    .chart-box {
        width: 320px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
</style>
</head>

<body>

<h2>Attendance Distribution</h2>

<div class="chart-box">
    <canvas id="attendanceChart"></canvas>
</div>

<script>
    const ctx = document.getElementById('attendanceChart');

    new Chart(ctx, {
        type: 'doughnut',   // you can change to 'pie'
        data: {
            labels: ['Present', 'Absent', 'Leave'],
            datasets: [{
                data: [70, 20, 10],
                backgroundColor: [
                    '#28a745',
                    '#dc3545',
                    '#ffc107'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
</script>

</body>
</html>

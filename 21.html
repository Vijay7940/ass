<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Timetable</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        table {
            text-align: center;
        }
        th, td {
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Weekly Timetable</h2>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Day/Time</th>
                <th>9-10</th>
                <th>10-11</th>
                <th>11-12</th>
                <th>12-1</th>
                <th>1-2</th>
                <th>2-3</th>
            </tr>
        </thead>

        <tbody>
            <!-- Monday -->
            <tr>
                <th>Monday</th>
                <td>Math</td>
                <td>DBMS</td>
                <td rowspan="2">Lab</td>
                <td>OS</td>
                <td colspan="2">Lunch Break</td>
            </tr>

            <!-- Tuesday -->
            <tr>
                <th>Tuesday</th>
                <td>CN</td>
                <td>Math</td>
                <td>DBMS</td>
                <td colspan="2">Lunch Break</td>
            </tr>

            <!-- Wednesday -->
            <tr>
                <th>Wednesday</th>
                <td colspan="2">Seminar</td>
                <td>OS</td>
                <td>CN</td>
                <td colspan="2">Lunch Break</td>
            </tr>

            <!-- Thursday -->
            <tr>
                <th>Thursday</th>
                <td>Math</td>
                <td>DBMS</td>
                <td>CN</td>
                <td rowspan="2">Project</td>
                <td colspan="2">Lunch Break</td>
            </tr>

            <!-- Friday -->
            <tr>
                <th>Friday</th>
                <td>OS</td>
                <td>Math</td>
                <td>CN</td>
                <td colspan="2">Lunch Break</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reusable Skill Bar Component</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .skill-container {
            margin: 20px 0;
        }
        .skill-label {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Skill Bar Component</h2>

    <!-- Skill Bars Container -->
    <div id="skills"></div>
</div>

<script>
    // Reusable function
    function createSkillBar(skillName, percentage) {
        const container = document.getElementById("skills");

        const skillDiv = document.createElement("div");
        skillDiv.classList.add("skill-container");

        skillDiv.innerHTML = `
            <div class="d-flex justify-content-between">
                <span class="skill-label">${skillName}</span>
                <span>${percentage}%</span>
            </div>
            <div class="progress">
                <div class="progress-bar" role="progressbar"
                     style="width: ${percentage}%"
                     aria-valuenow="${percentage}"
                     aria-valuemin="0"
                     aria-valuemax="100">
                </div>
            </div>
        `;

        container.appendChild(skillDiv);
    }

    // Example usage (reusable)
    createSkillBar("HTML", 90);
    createSkillBar("CSS", 80);
    createSkillBar("JavaScript", 75);
    createSkillBar("Bootstrap", 85);
</script>

</body>
</html>

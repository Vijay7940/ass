<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .qty-btn {
            width: 35px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Shopping Cart</h2>

    <table class="table table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>Product</th>
                <th>Price (₹)</th>
                <th>Quantity</th>
                <th>Subtotal (₹)</th>
            </tr>
        </thead>
        <tbody id="cartBody"></tbody>
    </table>

    <h4 class="text-end">Total: ₹<span id="totalPrice">0</span></h4>
</div>

<script>
    // Product Data
    const products = [
        { name: "Laptop", price: 50000, qty: 1 },
        { name: "Phone", price: 20000, qty: 1 },
        { name: "Headphones", price: 3000, qty: 1 }
    ];

    const cartBody = document.getElementById("cartBody");
    const totalPriceEl = document.getElementById("totalPrice");

    // Display Cart
    function renderCart() {
        cartBody.innerHTML = "";

        products.forEach((product, index) => {
            const subtotal = product.price * product.qty;

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${product.name}</td>
                <td>${product.price}</td>
                <td>
                    <button class="btn btn-danger qty-btn" onclick="changeQty(${index}, -1)">-</button>
                    <span class="mx-2">${product.qty}</span>
                    <button class="btn btn-success qty-btn" onclick="changeQty(${index}, 1)">+</button>
                </td>
                <td>${subtotal}</td>
            `;

            cartBody.appendChild(row);
        });

        updateTotal();
    }

    // Change Quantity
    function changeQty(index, change) {
        if (products[index].qty + change > 0) {
            products[index].qty += change;
            renderCart();
        }
    }

    // Update Total
    function updateTotal() {
        let total = 0;
        products.forEach(p => {
            total += p.price * p.qty;
        });
        totalPriceEl.innerText = total;
    }

    // Initial Load
    renderCart();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Quiz Application</h2>

    <div id="quizBox">
        <h4 id="question"></h4>

        <div id="options" class="mt-3"></div>

        <button class="btn btn-primary mt-3" onclick="nextQuestion()">Next</button>
    </div>

    <div id="result" class="text-center mt-4"></div>
</div>

<script>
    const quizData = [
        {
            question: "What does HTML stand for?",
            options: ["Hyper Text Markup Language", "High Tech Machine Learning", "Hyperlinks Text Machine Language", "None"],
            correct: 0
        },
        {
            question: "Which language is used for styling?",
            options: ["HTML", "Python", "CSS", "C++"],
            correct: 2
        },
        {
            question: "Which is a JavaScript framework?",
            options: ["Django", "Laravel", "React", "Flask"],
            correct: 2
        }
    ];

    let currentQ = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const resultEl = document.getElementById("result");

    function loadQuestion() {
        const q = quizData[currentQ];
        questionEl.innerText = q.question;

        optionsEl.innerHTML = "";

        q.options.forEach((opt, index) => {
            const div = document.createElement("div");
            div.innerHTML = `
                <input type="radio" name="option" value="${index}"> ${opt}
            `;
            optionsEl.appendChild(div);
        });
    }

    function nextQuestion() {
        const selected = document.querySelector('input[name="option"]:checked');

        if (!selected) {
            alert("Please select an option!");
            return;
        }

        if (parseInt(selected.value) === quizData[currentQ].correct) {
            score++;
        }

        currentQ++;

        if (currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById("quizBox").style.display = "none";
        resultEl.innerHTML = `<h3>Your Score: ${score} / ${quizData.length}</h3>`;
    }

    // Load first question
    loadQuestion();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Gallery</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
    }

    /* Grid Layout */
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .gallery-item {
        position: relative;
        overflow: hidden;
        border-radius: 10px;
    }

    .gallery-item img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        transition: transform 0.4s ease;
    }

    /* Zoom Effect */
    .gallery-item:hover img {
        transform: scale(1.2);
    }

    /* Overlay */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.4s ease;
        font-size: 18px;
    }

    .gallery-item:hover .overlay {
        opacity: 1;
    }
</style>
</head>

<body>

<h2>Photo Gallery</h2>

<div class="gallery">

    <div class="gallery-item">
        <img src="https://via.placeholder.com/400">
        <div class="overlay">Image 1</div>
    </div>

    <div class="gallery-item">
        <img src="https://via.placeholder.com/400">
        <div class="overlay">Image 2</div>
    </div>

    <div class="gallery-item">
        <img src="https://via.placeholder.com/400">
        <div class="overlay">Image 3</div>
    </div>

    <div class="gallery-item">
        <img src="https://via.placeholder.com/400">
        <div class="overlay">Image 4</div>
    </div>

    <div class="gallery-item">
        <img src="https://via.placeholder.com/400">
        <div class="overlay">Image 5</div>
    </div>

    <div class="gallery-item">
        <img src="https://via.placeholder.com/400">
        <div class="overlay">Image 6</div>
    </div>

</div>

</body>
</html>

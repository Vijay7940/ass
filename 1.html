<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Glossary - HTML Tags</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">Digital Glossary of HTML Tags</h2>

    <!-- Search Bar -->
    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search HTML tags...">

    <!-- Table -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Tag</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody id="tagTable">
            <tr>
                <td>&lt;p&gt;</td>
                <td>Defines a paragraph</td>
            </tr>
            <tr>
                <td>&lt;h1&gt;</td>
                <td>Defines a heading</td>
            </tr>
            <tr>
                <td>&lt;a&gt;</td>
                <td>Defines a hyperlink</td>
            </tr>
            <tr>
                <td>&lt;img&gt;</td>
                <td>Embeds an image</td>
            </tr>
            <tr>
                <td>&lt;table&gt;</td>
                <td>Defines a table</td>
            </tr>
            <tr>
                <td>&lt;ul&gt;</td>
                <td>Defines an unordered list</td>
            </tr>
            <tr>
                <td>&lt;li&gt;</td>
                <td>Defines a list item</td>
            </tr>
            <tr>
                <td>&lt;div&gt;</td>
                <td>Defines a division or section</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- JavaScript for Filtering -->
<script>
    const searchInput = document.getElementById("searchInput");
    const tableRows = document.querySelectorAll("#tagTable tr");

    searchInput.addEventListener("keyup", function () {
        const filter = searchInput.value.toLowerCase();

        tableRows.forEach(row => {
            const text = row.textContent.toLowerCase();
            if (text.includes(filter)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    });
</script>

</body>
</html>

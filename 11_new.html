<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    table {
        width: 80%;
        margin: auto;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 12px;
        border: 1px solid #ddd;
        text-align: center;
    }

    th {
        background: #333;
        color: white;
    }

    button {
        width: 30px;
        height: 30px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        color: white;
    }

    .minus {
        background: #dc3545;
    }

    .plus {
        background: #28a745;
    }

    .total {
        width: 80%;
        margin: 20px auto;
        text-align: right;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h2>Shopping Cart</h2>

<table>
    <thead>
        <tr>
            <th>Product</th>
            <th>Price (₹)</th>
            <th>Quantity</th>
            <th>Subtotal (₹)</th>
        </tr>
    </thead>
    <tbody id="cartBody"></tbody>
</table>

<div class="total">
    Total: ₹<span id="totalPrice">0</span>
</div>

<script>
    const products = [
        { name: "Laptop", price: 50000, qty: 1 },
        { name: "Phone", price: 20000, qty: 1 },
        { name: "Headphones", price: 3000, qty: 1 }
    ];

    const cartBody = document.getElementById("cartBody");
    const totalPriceEl = document.getElementById("totalPrice");

    function renderCart() {
        cartBody.innerHTML = "";

        products.forEach((product, index) => {
            const subtotal = product.price * product.qty;

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${product.name}</td>
                <td>${product.price}</td>
                <td>
                    <button class="minus" onclick="changeQty(${index}, -1)">-</button>
                    ${product.qty}
                    <button class="plus" onclick="changeQty(${index}, 1)">+</button>
                </td>
                <td>${subtotal}</td>
            `;

            cartBody.appendChild(row);
        });

        updateTotal();
    }

    function changeQty(index, change) {
        if (products[index].qty + change > 0) {
            products[index].qty += change;
            renderCart();
        }
    }

    function updateTotal() {
        let total = 0;
        products.forEach(p => total += p.price * p.qty);
        totalPriceEl.innerText = total;
    }

    renderCart();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FAQ Accordion</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .accordion {
        max-width: 600px;
        margin: auto;
    }

    .item {
        background: white;
        margin-bottom: 10px;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .question {
        padding: 15px;
        cursor: pointer;
        font-weight: bold;
        background: #eee;
    }

    .answer {
        padding: 15px;
        display: none;
    }

    .item.active .answer {
        display: block;
    }
</style>
</head>

<body>

<h2>FAQ Accordion</h2>

<div class="accordion">

    <div class="item active">
        <div class="question">What is HTML?</div>
        <div class="answer">
            HTML is the standard markup language for creating web pages.
        </div>
    </div>

    <div class="item">
        <div class="question">What is CSS?</div>
        <div class="answer">
            CSS is used to style and layout web pages.
        </div>
    </div>

    <div class="item">
        <div class="question">What is JavaScript?</div>
        <div class="answer">
            JavaScript is a programming language used to make web pages interactive.
        </div>
    </div>

</div>

<script>
    const items = document.querySelectorAll(".item");

    items.forEach(item => {
        const question = item.querySelector(".question");

        question.addEventListener("click", () => {
            // Close all
            items.forEach(i => i.classList.remove("active"));

            // Open clicked
            item.classList.add("active");
        });
    });
</script>

</body>
</html>

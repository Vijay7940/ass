<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>String Operations</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">String Operations</h2>

    <!-- Input -->
    <input type="text" id="inputString" class="form-control mb-3" placeholder="Enter a string">

    <!-- Buttons -->
    <div class="text-center mb-3">
        <button class="btn btn-primary m-1" onclick="reverseString()">Reverse</button>
        <button class="btn btn-success m-1" onclick="toUpper()">Uppercase</button>
        <button class="btn btn-warning m-1" onclick="toLower()">Lowercase</button>
        <button class="btn btn-info m-1" onclick="getLength()">Length</button>
    </div>

    <!-- Output -->
    <h4 class="text-center">Result: <span id="result"></span></h4>
</div>

<script>
    const input = document.getElementById("inputString");
    const result = document.getElementById("result");

    function reverseString() {
        const str = input.value;
        result.innerText = str.split("").reverse().join("");
    }

    function toUpper() {
        result.innerText = input.value.toUpperCase();
    }

    function toLower() {
        result.innerText = input.value.toLowerCase();
    }

    function getLength() {
        result.innerText = input.value.length;
    }
</script>

</body>
</html>

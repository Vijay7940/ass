<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Filtering</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card {
            margin: 10px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Product Filtering</h2>

    <!-- Filter Buttons -->
    <div class="text-center mb-4">
        <button class="btn btn-primary m-1" onclick="filterProducts('all')">All</button>
        <button class="btn btn-success m-1" onclick="filterProducts('electronics')">Electronics</button>
        <button class="btn btn-warning m-1" onclick="filterProducts('clothing')">Clothing</button>
    </div>

    <!-- Product Container -->
    <div class="row" id="productContainer"></div>
</div>

<script>
    const products = [
        { name: "Laptop", category: "electronics", price: 50000 },
        { name: "Phone", category: "electronics", price: 20000 },
        { name: "T-Shirt", category: "clothing", price: 500 },
        { name: "Jeans", category: "clothing", price: 1200 }
    ];

    const container = document.getElementById("productContainer");

    function displayProducts(list) {
        container.innerHTML = "";

        list.forEach(product => {
            const card = document.createElement("div");
            card.className = "col-md-3";

            card.innerHTML = `
                <div class="card p-3">
                    <h5>${product.name}</h5>
                    <p>Category: ${product.category}</p>
                    <p>Price: ₹${product.price}</p>
                </div>
            `;

            container.appendChild(card);
        });
    }

    function filterProducts(category) {
        if (category === "all") {
            displayProducts(products);
        } else {
            const filtered = products.filter(p => p.category === category);
            displayProducts(filtered);
        }
    }

    // Initial load
    displayProducts(products);
</script>

</body>
</html>

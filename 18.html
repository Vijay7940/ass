<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .note {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Notes Application</h2>

    <!-- Input -->
    <div class="input-group mb-3">
        <input type="text" id="noteInput" class="form-control" placeholder="Enter note">
        <button class="btn btn-primary" onclick="addNote()">Add</button>
    </div>

    <!-- Notes List -->
    <div id="notesContainer"></div>
</div>

<script>
    const noteInput = document.getElementById("noteInput");
    const notesContainer = document.getElementById("notesContainer");

    // Load notes from localStorage
    let notes = JSON.parse(localStorage.getItem("notes")) || [];

    function saveNotes() {
        localStorage.setItem("notes", JSON.stringify(notes));
    }

    function displayNotes() {
        notesContainer.innerHTML = "";

        notes.forEach((note, index) => {
            const div = document.createElement("div");
            div.className = "card p-2 note";

            div.innerHTML = `
                <span>${note}</span>
                <button class="btn btn-danger btn-sm float-end" onclick="deleteNote(${index})">Delete</button>
            `;

            notesContainer.appendChild(div);
        });
    }

    function addNote() {
        const text = noteInput.value.trim();

        if (text === "") {
            alert("Enter a note!");
            return;
        }

        notes.push(text);
        saveNotes();
        displayNotes();

        noteInput.value = "";
    }

    function deleteNote(index) {
        notes.splice(index, 1);
        saveNotes();
        displayNotes();
    }

    // Initial load
    displayNotes();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Gallery</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* Zoom Effect */
        .gallery-item:hover img {
            transform: scale(1.2);
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Photo Gallery</h2>

    <div class="row g-4">

        <!-- Image 1 -->
        <div class="col-md-4">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/400" alt="Image 1">
                <div class="overlay">Image 1</div>
            </div>
        </div>

        <!-- Image 2 -->
        <div class="col-md-4">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/400" alt="Image 2">
                <div class="overlay">Image 2</div>
            </div>
        </div>

        <!-- Image 3 -->
        <div class="col-md-4">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/400" alt="Image 3">
                <div class="overlay">Image 3</div>
            </div>
        </div>

        <!-- Image 4 -->
        <div class="col-md-4">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/400" alt="Image 4">
                <div class="overlay">Image 4</div>
            </div>
        </div>

        <!-- Image 5 -->
        <div class="col-md-4">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/400" alt="Image 5">
                <div class="overlay">Image 5</div>
            </div>
        </div>

        <!-- Image 6 -->
        <div class="col-md-4">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/400" alt="Image 6">
                <div class="overlay">Image 6</div>
            </div>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        margin: 0;
        padding: 0;
    }

    .form-container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        max-width: 500px;
        margin: 50px auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h3 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
    }

    .gender-group {
        margin-bottom: 15px;
    }

    .gender-group label {
        font-weight: normal;
        margin-right: 15px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        opacity: 0.9;
    }

    .error {
        color: red;
        font-size: 14px;
        margin-top: -10px;
        margin-bottom: 10px;
        display: none;
    }

    .success {
        text-align: center;
        color: green;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="form-container">
    <h3>Student Registration</h3>

    <form id="regForm">

        <!-- Name -->
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">
        <div class="error" id="nameError">Name is required</div>

        <!-- Email -->
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
        <div class="error" id="emailError">Valid email is required</div>

        <!-- Gender -->
        <label>Gender</label>
        <div class="gender-group">
            <label><input type="radio" name="gender" value="Male"> Male</label>
            <label><input type="radio" name="gender" value="Female"> Female</label>
        </div>
        <div class="error" id="genderError">Select gender</div>

        <!-- Course -->
        <label>Course</label>
        <select id="course">
            <option value="">Select Course</option>
            <option>BCA</option>
            <option>BSc IT</option>
            <option>MCA</option>
        </select>
        <div class="error" id="courseError">Select a course</div>

        <!-- Address -->
        <label>Address</label>
        <textarea id="address" rows="3" placeholder="Enter your address"></textarea>
        <div class="error" id="addressError">Address is required</div>

        <!-- Submit -->
        <button type="submit">Register</button>

        <div class="success" id="successMsg"></div>

    </form>
</div>

<script>
    const form = document.getElementById("regForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let isValid = true;

        // Get values
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const gender = document.querySelector('input[name="gender"]:checked');
        const course = document.getElementById("course").value;
        const address = document.getElementById("address").value.trim();

        // Reset errors
        document.querySelectorAll(".error").forEach(el => el.style.display = "none");

        // Validation
        if (name === "") {
            document.getElementById("nameError").style.display = "block";
            isValid = false;
        }

        if (email === "" || !email.includes("@")) {
            document.getElementById("emailError").style.display = "block";
            isValid = false;
        }

        if (!gender) {
            document.getElementById("genderError").style.display = "block";
            isValid = false;
        }

        if (course === "") {
            document.getElementById("courseError").style.display = "block";
            isValid = false;
        }

        if (address === "") {
            document.getElementById("addressError").style.display = "block";
            isValid = false;
        }

        // Success
        if (isValid) {
            document.getElementById("successMsg").innerText = "Registration Successful!";
            form.reset();
        }
    });
</script>

</body>
</html>

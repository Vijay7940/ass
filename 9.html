<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drag and Drop List</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .list-group-item {
            cursor: grab;
        }

        .dragging {
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Drag and Drop List</h2>

    <ul class="list-group" id="draggableList">
        <li class="list-group-item" draggable="true">Item 1</li>
        <li class="list-group-item" draggable="true">Item 2</li>
        <li class="list-group-item" draggable="true">Item 3</li>
        <li class="list-group-item" draggable="true">Item 4</li>
        <li class="list-group-item" draggable="true">Item 5</li>
    </ul>
</div>

<script>
    const list = document.getElementById("draggableList");
    let draggedItem = null;

    const items = document.querySelectorAll(".list-group-item");

    items.forEach(item => {
        item.addEventListener("dragstart", () => {
            draggedItem = item;
            item.classList.add("dragging");
        });

        item.addEventListener("dragend", () => {
            item.classList.remove("dragging");
        });

        item.addEventListener("dragover", (e) => {
            e.preventDefault(); // allow drop
        });

        item.addEventListener("drop", () => {
            if (draggedItem !== item) {
                let temp = item.innerHTML;
                item.innerHTML = draggedItem.innerHTML;
                draggedItem.innerHTML = temp;
            }
        });
    });
</script>

</body>
</html>

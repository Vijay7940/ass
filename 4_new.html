<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real-Time Profile Previewer</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    .container {
        width: 80%;
        margin: auto;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
    }

    .row {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
    }

    .column {
        width: 48%;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    .profile-card {
        text-align: center;
    }

    .profile-card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Real-Time Profile Previewer</h2>

    <div class="row">
        <!-- Form -->
        <div class="column">
            <h3>Enter Details</h3>

            <input type="text" id="nameInput" placeholder="Enter Name">
            <input type="text" id="roleInput" placeholder="Enter Role">
            <textarea id="bioInput" placeholder="Enter Bio"></textarea>
            <input type="text" id="imageInput" placeholder="Enter Image URL">
        </div>

        <!-- Preview -->
        <div class="column">
            <h3>Profile Preview</h3>

            <div class="profile-card">
                <img id="profileImage" src="https://via.placeholder.com/100">
                <h3 id="profileName">Your Name</h3>
                <p id="profileRole">Your Role</p>
                <p id="profileBio">Your bio will appear here...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const nameInput = document.getElementById("nameInput");
    const roleInput = document.getElementById("roleInput");
    const bioInput = document.getElementById("bioInput");
    const imageInput = document.getElementById("imageInput");

    const profileName = document.getElementById("profileName");
    const profileRole = document.getElementById("profileRole");
    const profileBio = document.getElementById("profileBio");
    const profileImage = document.getElementById("profileImage");

    nameInput.addEventListener("input", () => {
        profileName.innerText = nameInput.value || "Your Name";
    });

    roleInput.addEventListener("input", () => {
        profileRole.innerText = roleInput.value || "Your Role";
    });

    bioInput.addEventListener("input", () => {
        profileBio.innerText = bioInput.value || "Your bio will appear here...";
    });

    imageInput.addEventListener("input", () => {
        profileImage.src = imageInput.value || "https://via.placeholder.com/100";
    });
</script>

</body>
</html>

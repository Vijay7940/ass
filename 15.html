<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stopwatch</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .time {
            font-size: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container text-center mt-5">
    <h2>Stopwatch</h2>

    <!-- Display -->
    <div class="time my-4" id="display">00:00:00</div>

    <!-- Buttons -->
    <button class="btn btn-success m-2" onclick="start()">Start</button>
    <button class="btn btn-danger m-2" onclick="stop()">Stop</button>
    <button class="btn btn-secondary m-2" onclick="reset()">Reset</button>
</div>

<script>
    let seconds = 0;
    let interval = null;

    function updateDisplay() {
        let hrs = Math.floor(seconds / 3600);
        let mins = Math.floor((seconds % 3600) / 60);
        let secs = seconds % 60;

        document.getElementById("display").innerText =
            String(hrs).padStart(2, '0') + ":" +
            String(mins).padStart(2, '0') + ":" +
            String(secs).padStart(2, '0');
    }

    function start() {
        if (interval) return; // prevent multiple intervals
        interval = setInterval(() => {
            seconds++;
            updateDisplay();
        }, 1000);
    }

    function stop() {
        clearInterval(interval);
        interval = null;
    }

    function reset() {
        stop();
        seconds = 0;
        updateDisplay();
    }
</script>

</body>
</html>

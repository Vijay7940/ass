<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        margin-bottom: 20px;
    }

    .input-group {
        display: flex;
        margin-bottom: 15px;
    }

    input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px 0 0 5px;
        outline: none;
    }

    button {
        padding: 10px 15px;
        border: none;
        cursor: pointer;
        color: white;
    }

    .add-btn {
        background: #007bff;
        border-radius: 0 5px 5px 0;
    }

    .note {
        background: #fafafa;
        padding: 10px;
        margin-top: 10px;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 0 5px rgba(0,0,0,0.05);
    }

    .delete-btn {
        background: #dc3545;
        padding: 5px 10px;
        border-radius: 5px;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Notes Application</h2>

    <!-- Input -->
    <div class="input-group">
        <input type="text" id="noteInput" placeholder="Enter note">
        <button class="add-btn" onclick="addNote()">Add</button>
    </div>

    <!-- Notes -->
    <div id="notesContainer"></div>
</div>

<script>
    const noteInput = document.getElementById("noteInput");
    const notesContainer = document.getElementById("notesContainer");

    let notes = JSON.parse(localStorage.getItem("notes")) || [];

    function saveNotes() {
        localStorage.setItem("notes", JSON.stringify(notes));
    }

    function displayNotes() {
        notesContainer.innerHTML = "";

        notes.forEach((note, index) => {
            const div = document.createElement("div");
            div.className = "note";

            div.innerHTML = `
                <span>${note}</span>
                <button class="delete-btn" onclick="deleteNote(${index})">Delete</button>
            `;

            notesContainer.appendChild(div);
        });
    }

    function addNote() {
        const text = noteInput.value.trim();

        if (text === "") {
            alert("Enter a note!");
            return;
        }

        notes.push(text);
        saveNotes();
        displayNotes();

        noteInput.value = "";
    }

    function deleteNote(index) {
        notes.splice(index, 1);
        saveNotes();
        displayNotes();
    }

    displayNotes();
</script>

</body>
</html>
